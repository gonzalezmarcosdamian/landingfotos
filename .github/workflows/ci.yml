name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela ejecuciones previas en la misma rama/PR para ahorrar recursos
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # ── Análisis estático: formato y reglas de lint ───────────────────────────
  lint:
    name: Lint (ESLint + Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  # ── Tipos: sin errores de TypeScript ──────────────────────────────────────
  typecheck:
    name: Typecheck (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  # ── Tests unitarios + cobertura mínima 80% ────────────────────────────────
  test:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ── Build de producción ───────────────────────────────────────────────────
  build:
    name: Build (next build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Valores dummy para que el build no requiera infra real en CI
          PAYLOAD_SECRET: ci-dummy-secret-not-used-in-prod
          DATABASE_URI: ${{ secrets.CI_DATABASE_URI || 'postgresql://localhost:5432/ci' }}
          NEXT_PUBLIC_SITE_URL: https://saltframevisuals.com

  # ── End-to-end + accesibilidad (axe) ──────────────────────────────────────
  e2e:
    name: E2E (Playwright + axe)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Presupuesto de Web Vitals (no bloquea inicialmente) ───────────────────
  lighthouse:
    name: Lighthouse CI (Web Vitals)
    runs-on: ubuntu-latest
    needs: [build]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          PAYLOAD_SECRET: ci-dummy-secret-not-used-in-prod
          DATABASE_URI: ${{ secrets.CI_DATABASE_URI || 'postgresql://localhost:5432/ci' }}
          NEXT_PUBLIC_SITE_URL: https://saltframevisuals.com
      - name: Run Lighthouse CI
        run: npx @lhci/cli autorun || echo "Lighthouse budget warning"

  # ── Auditoría de dependencias ─────────────────────────────────────────────
  audit:
    name: Security audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high || echo "Audit warnings — revisar antes de release"
